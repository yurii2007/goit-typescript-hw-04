# Bacon configuration — https://dystroy.org/bacon/

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--workspace", "--color", "always"]
need_stdout = false

[jobs.check-api]
command = ["cargo", "check", "-p", "api", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--workspace", "--color", "always"]
need_stdout = true

[jobs.run]
command = ["cargo", "run", "-p", "rust_api", "--color", "always"]
need_stdout = true
allow_warnings = true
on_change_strategy = "kill_then_restart"

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

[keybindings]
c = "job:check"
l = "job:clippy"
t = "job:test"
r = "job:run"
a = "job:check-api"
d = "job:doc"
