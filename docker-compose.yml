services:
  db:
    image: postgres
    restart: no
    env_file:
      - path: ./.env
        required: true
    container_name: postgres_finance_app
    volumes:
      - ./pgdata:/var/lib/postgresql
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    restart: no
    container_name: pgadmin4-web_finance_app
    env_file:
      - path: ./.env
        required: true
    ports:
      - '5050:80'
    depends_on:
      - db

volumes:
  db:
